# NOTE: Redis, Postgres, and Traefik are managed externally on the VPS.
# This compose file implements Blue-Green for the Ellebeo Growth Studio services.
#
# Networking:
#   - Traefik runs on the host (not in Docker). It discovers containers via the
#     Docker socket and routes to them using their labels. No shared Docker
#     network is required.
#   - host.docker.internal is mapped to the host gateway so containers can reach
#     Redis/Postgres running on the VPS host (not resolvable by default on Linux).

x-base-node: &base-node
  restart: unless-stopped
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  mem_limit: 512m
  cpus: 0.5
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  # ==========================================
  # BLUE ENVIRONMENT
  # ==========================================
  backend-blue:
    <<: *base-node
    image: ${BACKEND_IMAGE:-ghcr.io/prateek-pareek/ellebeo-growth-studio/backend:latest}
    container_name: growth-studio-backend-blue
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.growth-studio-api-blue.rule=Host(`${GROWTH_STUDIO_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.growth-studio-api-blue.priority=${TRAEFIK_PRIORITY_BACKEND:-500}"
      - "traefik.http.routers.growth-studio-api-blue.entrypoints=websecure"
      - "traefik.http.routers.growth-studio-api-blue.tls.certresolver=letsencrypt"
      - "traefik.http.services.growth-studio-api-blue.loadbalancer.server.port=3000"
    profiles: ["blue"]

  frontend-blue:
    <<: *base-node
    image: ${FRONTEND_IMAGE:-ghcr.io/prateek-pareek/ellebeo-growth-studio/frontend:latest}
    container_name: growth-studio-frontend-blue
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.growth-studio-web-blue.rule=Host(`${GROWTH_STUDIO_DOMAIN}`)"
      - "traefik.http.routers.growth-studio-web-blue.priority=${TRAEFIK_PRIORITY_FRONTEND:-100}"
      - "traefik.http.routers.growth-studio-web-blue.entrypoints=websecure"
      - "traefik.http.routers.growth-studio-web-blue.tls.certresolver=letsencrypt"
      - "traefik.http.services.growth-studio-web-blue.loadbalancer.server.port=3000"
    profiles: ["blue"]

  # ==========================================
  # GREEN ENVIRONMENT
  # ==========================================
  backend-green:
    <<: *base-node
    image: ${BACKEND_IMAGE:-ghcr.io/prateek-pareek/ellebeo-growth-studio/backend:latest}
    container_name: growth-studio-backend-green
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.growth-studio-api-green.rule=Host(`${GROWTH_STUDIO_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.growth-studio-api-green.priority=${TRAEFIK_PRIORITY_BACKEND:-500}"
      - "traefik.http.routers.growth-studio-api-green.entrypoints=websecure"
      - "traefik.http.routers.growth-studio-api-green.tls.certresolver=letsencrypt"
      - "traefik.http.services.growth-studio-api-green.loadbalancer.server.port=3000"
    profiles: ["green"]

  frontend-green:
    <<: *base-node
    image: ${FRONTEND_IMAGE:-ghcr.io/prateek-pareek/ellebeo-growth-studio/frontend:latest}
    container_name: growth-studio-frontend-green
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.growth-studio-web-green.rule=Host(`${GROWTH_STUDIO_DOMAIN}`)"
      - "traefik.http.routers.growth-studio-web-green.priority=${TRAEFIK_PRIORITY_FRONTEND:-100}"
      - "traefik.http.routers.growth-studio-web-green.entrypoints=websecure"
      - "traefik.http.routers.growth-studio-web-green.tls.certresolver=letsencrypt"
      - "traefik.http.services.growth-studio-web-green.loadbalancer.server.port=3000"
    profiles: ["green"]

  # ==========================================
  # BACKGROUND WORKERS
  # ==========================================
  # NOTE: the content-generation worker runs IN-PROCESS inside the API
  # container (see backend/src/main.ts) because it emits live progress over
  # the API's socket.io server. Only the image/video workers run standalone.
  worker-image:
    <<: *base-node
    restart: on-failure:5
    image: ${BACKEND_IMAGE:-ghcr.io/prateek-pareek/ellebeo-growth-studio/backend:latest}
    container_name: growth-studio-worker-image
    mem_limit: 1g
    cpus: 0.75
    command: ["node", "dist/ai/workers/image-processing.worker.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-video:
    <<: *base-node
    restart: on-failure:5
    image: ${BACKEND_IMAGE:-ghcr.io/prateek-pareek/ellebeo-growth-studio/backend:latest}
    container_name: growth-studio-worker-video
    mem_limit: 1.5g
    memswap_limit: 2g
    cpus: 1.0
    command: ["node", "dist/ai/workers/video-assembly.worker.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==========================================
  # DATABASE MIGRATIONS (one-off)
  # ==========================================
  # Run with: docker compose run --rm migrate
  # Applies pending Prisma migrations against DATABASE_URL before traffic switch.
  migrate:
    <<: *base-node
    restart: "no"
    image: ${BACKEND_IMAGE:-ghcr.io/prateek-pareek/ellebeo-growth-studio/backend:latest}
    container_name: growth-studio-migrate
    entrypoint: ["node", "node_modules/prisma/build/index.js"]
    command: ["migrate", "deploy"]
